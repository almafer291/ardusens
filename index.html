<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ardusens Ultra Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="sidebar">
    <h2 class="logo">ARDU<span>SENS</span></h2>
    <div class="nav-btn active" onclick="switchTab('sensores')"><i class="fas fa-microchip"></i> Sensores</div>
    <div class="nav-btn" onclick="switchTab('reles')"><i class="fas fa-toggle-on"></i> Actuadores</div>
    <div class="nav-btn" onclick="switchTab('clima')"><i class="fas fa-cloud-sun"></i> Clima</div>
    <div class="nav-btn" onclick="switchTab('energia')"><i class="fas fa-bolt"></i> Precio Luz</div>
</div>

<div class="main">
    <section id="tab-energia" class="tab-content" style="display:none">
        <div class="stats-row">
            <div class="card-mini"><span>AHORA</span><h2 id="p-now">-- €</h2><small>MW/h</small></div>
            <div class="card-mini"><span>MÍNIMO</span><h2 id="p-min">-- €</h2></div>
            <div class="card-mini"><span>MÁXIMO</span><h2 id="p-max">-- €</h2></div>
        </div>
        <div class="chart-box">
            <canvas id="luzChart"></canvas>
        </div>
    </section>

    <section id="tab-reles" class="tab-content" style="display:none">
        <div id="reles-container" class="grid-reles"></div>
    </section>

    <section id="tab-sensores" class="tab-content">
        <div class="stats-row">
            <div class="card-mini"><span>Humedad</span><h2 id="h-val">--%</h2></div>
            <div class="card-mini"><span>Temp</span><h2 id="t-val">--°C</h2></div>
        </div>
    </section>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
