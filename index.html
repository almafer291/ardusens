<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<div class="weather-dashboard">
    <div class="weather-hero glass">
        <div class="weather-main-info">
            <img id="w-icon" src="" alt="icon">
            <h1 id="w-temp">--°C</h1>
            <p id="w-desc">Reading the sky...</p>
        </div>
        <div class="weather-details-grid">
            <div class="w-detail"><span><i class="fas fa-thermometer-half"></i> Feels</span><b id="w-feels">--°</b></div>
            <div class="w-detail"><span><i class="fas fa-eye"></i> Visibility</span><b id="w-vis">-- km</b></div>
            <div class="w-detail"><span><i class="fas fa-cloud"></i> Clouds</span><b id="w-cloud">--%</b></div>
            <div class="w-detail"><span><i class="fas fa-wind"></i> Wind</span><b id="w-wind">-- m/s</b></div>
            <div class="w-detail"><span><i class="fas fa-droplet"></i> Humidity</span><b id="w-hum">--%</b></div>
            <div class="w-detail"><span><i class="fas fa-sun"></i> Sunrise</span><b id="w-rise">--:--</b></div>
            <div class="w-detail"><span><i class="fas fa-moon"></i> Sunset</span><b id="w-set">--:--</b></div>
        </div>
    </div>
    <div class="forecast-list glass" id="w-forecast"></div>
</div>
