<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ardusens Pro Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="side-menu">
    <div class="brand">ARDUSENS <b>PRO</b></div>
    <button id="btn-sensores" class="side-btn active"><i class="fas fa-microchip"></i> Sensores</button>
    <button id="btn-reles" class="side-btn"><i class="fas fa-toggle-on"></i> Actuadores</button>
    <button id="btn-clima" class="side-btn"><i class="fas fa-cloud-sun"></i> Meteorología</button>
  </nav>

  <main class="main-content">
    <div id="sensores-display" class="content-display">
      <h2 class="section-title">Datos en Tiempo Real</h2>
      <div class="stats-grid">
        <div class="stat-card"><span>Humedad</span><h3 id="humidity">--%</h3></div>
        <div class="stat-card"><span>Temp AHT20</span><h3 id="tempAHT">--°C</h3></div>
        <div class="stat-card"><span>Presión</span><h3 id="pressure">-- hPa</h3></div>
        <div class="stat-card"><span>Temp BMP280</span><h3 id="tempBMP">--°C</h3></div>
      </div>
    </div>

    <div id="reles-control" class="content-display" style="display: none;">
      <h2 class="section-title">Control de Actuadores</h2>
      <div id="reles-status" class="reles-grid"></div>
    </div>

    <div id="clima-display" class="content-display" style="display: none;">
      <div class="weather-header">
        <div class="weather-main-info">
          <img id="weather-icon" src="" alt="clima">
          <h1 id="weather-temp">--°C</h1>
          <p id="weather-description">Cargando...</p>
        </div>
        <div class="weather-extra-grid" id="weather-details-grid">
          </div>
      </div>
      
      <h3 class="sub-title">Previsión Próximos 3 Días</h3>
      <div id="forecast-container" class="forecast-grid"></div>
    </div>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
