<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hestia | Home Essence</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Plus+Jakarta+Sans:wght@200;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <i class="fas fa-fire-alt"></i>
            <span>HESTIA</span>
        </div>
        <nav>
            <div class="nav-item active" onclick="showTab('essence')">
                <i class="fas fa-home"></i><span>Essence</span>
            </div>
            <div class="nav-item" onclick="showTab('core')">
                <i class="fas fa-microchip"></i><span>Core</span>
            </div>
            <div class="nav-item" onclick="showTab('atmosphere')">
                <i class="fas fa-cloud-sun"></i><span>Atmosphere</span>
            </div>
            <div class="nav-item" onclick="showTab('energy')">
                <i class="fas fa-bolt"></i><span>Energy</span>
            </div>
        </nav>
        <div class="sidebar-footer">System Online</div>
    </aside>

    <main class="content">
        <header class="top-header">
            <div>
                <h1 id="tab-title">Home Essence</h1>
                <div class="connection-status"><span class="pulse"></span>Live Feed</div>
            </div>
            <div id="live-clock">00:00:00</div>
        </header>

        <section id="tab-essence" class="tab-content active">
            <div class="metrics-grid">
                <div class="metric-card bronze">
                    <span>Temperature</span>
                    <h2 id="val-temp">--°</h2>
                </div>
                <div class="metric-card">
                    <span>Humidity</span>
                    <h2 id="val-hum">--%</h2>
                </div>
                <div class="metric-card">
                    <span>Pressure</span>
                    <h2 id="val-pres">--</h2>
                </div>
                <div class="metric-card gold">
                    <span>PCB Temp</span>
                    <h2 id="val-pcb">--°</h2>
                </div>
            </div>
            <div class="main-visual glass">
                <canvas id="mainChart"></canvas>
            </div>
        </section>

        <section id="tab-core" class="tab-content">
            <div class="relay-grid" id="relay-container">
                </div>
        </section>

        <section id="tab-atmosphere" class="tab-content">
            <div class="weather-dashboard">
                <div class="weather-hero glass">
                    <div class="weather-main-info">
                        <img id="w-icon" src="" alt="">
                        <h1 id="w-temp">--°</h1>
                        <p id="w-desc">Reading the sky...</p>
                    </div>
                    <div class="weather-details-grid">
                        <div class="w-detail"><span>Feels</span><b id="w-feels">--</b></div>
                        <div class="w-detail"><span>Wind</span><b id="w-wind">--</b></div>
                        <div class="w-detail"><span>Humidity</span><b id="w-hum-ext">--</b></div>
                        <div class="w-detail"><span>Visibility</span><b id="w-vis">--</b></div>
                        <div class="w-detail"><span>Clouds</span><b id="w-cloud">--</b></div>
                        <div class="w-detail"><span>Sunrise</span><b id="w-rise">--</b></div>
                        <div class="w-detail"><span>Sunset</span><b id="w-set">--</b></div>
                    </div>
                </div>
                <div id="w-forecast" class="forecast-list glass"></div>
            </div>
        </section>

        <section id="tab-energy" class="tab-content">
            <div class="metrics-grid">
                <div class="metric-card bronze">
                    <span>Current Price</span>
                    <h2 id="p-now">--</h2>
                </div>
                <div class="metric-card">
                    <span>Daily Min</span>
                    <h2 id="p-min">--</h2>
                </div>
                <div class="metric-card">
                    <span>Daily Max</span>
                    <h2 id="p-max">--</h2>
                </div>
            </div>
            <div class="main-visual glass">
                <canvas id="energyChart"></canvas>
            </div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
