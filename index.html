<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardusens Pro | Almería</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<aside class="sidebar">
    <div class="brand">
        <div class="logo-icon"><i class="fas fa-bolt"></i></div>
        <span>ARDUSENS<b>PRO</b></span>
    </div>
    <nav class="menu">
        <button id="btn-sensores" class="nav-item active"><i class="fas fa-chart-pie"></i> Dashboard</button>
        <button id="btn-reles" class="nav-item"><i class="fas fa-toggle-on"></i> Actuadores</button>
        <button id="btn-clima" class="nav-item"><i class="fas fa-cloud-sun"></i> Meteorología</button>
    </nav>
</aside>

<main class="main-content">
    <header class="header">
        <h1>Panel de Control</h1>
        <div class="status-indicator"><span class="pulse"></span> Almería Centro</div>
    </header>

    <section id="sensores-display" class="content-section">
        <div class="stats-grid">
            <div class="stat-card"><div class="card-icon blue"><i class="fas fa-droplet"></i></div><div class="card-data"><span class="label">Humedad</span><h2 id="humidity">--%</h2></div></div>
            <div class="stat-card"><div class="card-icon red"><i class="fas fa-temperature-half"></i></div><div class="card-data"><span class="label">Temperatura</span><h2 id="tempAHT">--°C</h2></div></div>
            <div class="stat-card"><div class="card-icon green"><i class="fas fa-gauge"></i></div><div class="card-data"><span class="label">Presión</span><h2 id="pressure">-- hPa</h2></div></div>
            <div class="stat-card"><div class="card-icon orange"><i class="fas fa-microchip"></i></div><div class="card-data"><span class="label">PCB Temp</span><h2 id="tempBMP">--°C</h2></div></div>
        </div>
        <div class="main-chart"><canvas id="sensorChart"></canvas></div>
    </section>

    <section id="clima-display" class="content-section" style="display:none">
        <div class="weather-hero">
            <img id="weather-icon" src="" alt="">
            <h1 id="weather-temp">--°C</h1>
            <p id="weather-description">Cargando...</p>
            <div class="weather-meta" id="weather-details"></div>
        </div>
    </section>

    <section id="reles-control" class="content-section" style="display:none">
        <div class="reles-grid" id="reles-grid"></div>
    </section>
</main>

<script type="module" src="script.js"></script>
</body>
</html>
