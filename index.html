<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardusens Ultra Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<aside class="sidebar">
    <div class="brand">ARDUSENS <b>ULTRA</b></div>
    <nav class="menu">
        <button id="btn-sensores" class="nav-item active"><i class="fas fa-chart-line"></i> Dashboard</button>
        <button id="btn-reles" class="nav-item"><i class="fas fa-toggle-on"></i> Actuadores</button>
        <button id="btn-clima" class="nav-item"><i class="fas fa-cloud-sun"></i> Clima</button>
        <button id="btn-energia" class="nav-item"><i class="fas fa-bolt"></i> Precio Luz</button>
    </nav>
</aside>

<main class="main-content">
    <section id="energia-display" class="content-section" style="display:none">
        <h2 class="section-title">Precio de la Energía (PVPC)</h2>
        <div class="stats-grid">
            <div class="stat-card yellow">
                <span>Precio Actual</span>
                <h2 id="price-now">Cargando...</h2>
                <small>€ / MWh</small>
            </div>
            <div class="stat-card green">
                <span>Mínimo Hoy</span>
                <h2 id="price-min">-- €</h2>
            </div>
            <div class="stat-card red">
                <span>Máximo Hoy</span>
                <h2 id="price-max">-- €</h2>
            </div>
        </div>
        <div class="main-chart-card">
            <div class="chart-container" style="position: relative; height:40vh; width:100%">
                <canvas id="energyChart"></canvas>
            </div>
        </div>
    </section>

    </main>

<script type="module" src="script.js"></script>
</body>
</html>
